<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/tasks.css" />
    <title>TaskLite</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <header class="header">
      <h2>TaskLite</h2>
      <nav class="header__menu">
        <ul>
          <li><a class="header__link focus" href="index.html">To Do</a></li>
          <li><a class="header__link focus" href="kanban.html">Kanban</a></li>
          <li><a class="header__link focus" href="habits.html">Привычки</a></li>
        </ul>
      </nav>
    </header>

    <main class="main">
      <section class="tasks">
        <h2 class="tasks-title">Задачи</h2>
        <form class="form">
          <div>
            <label for="task"></label>
            <input
              class="form__field"
              placeholder="Введите задачу"
              type="text"
              id="task"
              required
            />
            <button class="form__btn-submit" type="submit">Добавить</button>
          </div>
        </form>
        <div>
          <label for="findTask"></label>
          <input
            class="form__field"
            placeholder="Поиск задач..."
            type="text"
            id="findTask"
          />
          <button class="form__btn-filter" type="">Все</button>
          <button class="form__btn-filter" type="">Активные</button>
          <button class="form__btn-filter" type="">Завершённые</button>
          <button class="form__btn-filter" type="">Сначала старые</button>
        </div>
        <div class="task__elem">
          <!-- Tasks will be rendered here -->
        </div>
        <div class="counter-button">
          <div>
            <p>Всего: 0</p>
            <p>Активных: 0</p>
            <p>Выполненных: 0</p>
          </div>
          <button class="button--clear">Очистить выполненные</button>
        </div>
      </section>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
