<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/habits.css" />
    <title>TaskLite — Привычки</title>
</head>
<body>
    <header class="header">
        <h2>TaskLite</h2>
        <nav class="header__menu">
            <ul>
                <li><a class="header__link" href="index.html">To Do</a></li>
                <li><a class="header__link" href="kanban.html">Kanban</a></li>
                <li><a class="header__link focus" href="habits.html">Привычки</a></li>
            </ul>
        </nav>
    </header>

    <main class="main habits">
        <h2 class="habits--title">Мои привычки</h2>

        <!-- Список привычек -->
        <div class="habits-list" id="habitsList">
            <!-- Карточки привычек будут добавляться сюда через JS -->
        </div>

        <!-- Форма добавления новой привычки -->
        <div class="habit-form">
            <h3>Добавить новую привычку</h3>
            
            <div class="form-row">
                <input 
                    type="text" 
                    class="habit-input" 
                    id="habitName" 
                    placeholder="Название привычки" 
                />
            </div>

            <div class="form-row">
                <select class="habit-select" id="habitCategory">
                    <option value="">Выберите категорию</option>
                    <option value="Здоровье">Здоровье</option>
                    <option value="Спорт">Спорт</option>
                    <option value="Обучение">Обучение</option>
                    <option value="Продуктивность">Продуктивность</option>
                    <option value="Отдых">Отдых</option>
                </select>
            </div>

            <!-- Блок выбора цвета -->
            <div class="color-options" id="colorOptions">
                <div class="color-row" data-color="#ef4444">
                    <div class="color-tag color-red"></div>
                    <span>Красный</span>
                </div>
                <div class="color-row" data-color="#f59e0b">
                    <div class="color-tag color-orange"></div>
                    <span>Оранжевый</span>
                </div>
                <div class="color-row" data-color="#10b981">
                    <div class="color-tag color-green"></div>
                    <span>Зелёный</span>
                </div>
                <div class="color-row" data-color="#3b82f6">
                    <div class="color-tag color-blue"></div>
                    <span>Синий</span>
                </div>
                <div class="color-row" data-color="#8b5cf6">
                    <div class="color-tag color-purple"></div>
                    <span>Фиолетовый</span>
                </div>
                <div class="color-row" data-color="#ec4899">
                    <div class="color-tag color-pink"></div>
                    <span>Розовый</span>
                </div>
            </div>

            <button class="form__btn-submit" id="addHabitBtn">
                Добавить привычку
            </button>
        </div>
    </main>

    <script src="habits.js" defer></script>
</body>
</html>
